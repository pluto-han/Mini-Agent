<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Auto Agent 智能体 - By 小傅哥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 自定义样式 */
        .stage-indicator {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 8px;
            text-transform: uppercase;
        }

        .stage-analysis {
            background-color: #e3f2fd;
            color: #1976d2;
        }

        .stage-execution {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }

        .stage-supervision {
            background-color: #fff3e0;
            color: #f57c00;
        }

        .stage-summary {
            background-color: #e8f5e8;
            color: #388e3c;
        }

        .stage-error {
            background-color: #ffebee;
            color: #d32f2f;
        }

        .sub-type-indicator {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 500;
            margin-left: 4px;
            background-color: rgba(0, 0, 0, 0.1);
            color: rgba(0, 0, 0, 0.7);
        }

        .markdown-content {
            margin-top: 8px;
            line-height: 1.6;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin: 16px 0 8px 0;
            font-weight: 600;
            color: #2c3e50;
        }

        .markdown-content h1 { font-size: 1.5em; }
        .markdown-content h2 { font-size: 1.3em; }
        .markdown-content h3 { font-size: 1.2em; }
        .markdown-content h4 { font-size: 1.1em; }

        .markdown-content p {
            margin: 8px 0;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .markdown-content li {
            margin: 4px 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #3498db;
            margin: 16px 0;
            padding: 8px 16px;
            background: #f8f9fa;
            color: #555;
            font-style: italic;
        }

        .markdown-content code {
            background: #f1f3f4;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #d73a49;
        }

        .markdown-content pre {
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            color: inherit;
            font-size: 0.85em;
        }

        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        .markdown-content th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .markdown-content a {
            color: #3498db;
            text-decoration: none;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .markdown-content strong {
            font-weight: 600;
            color: #2c3e50;
        }

        .markdown-content em {
            font-style: italic;
            color: #555;
        }

        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            animation: messageSlideIn 0.3s ease-out;
        }

        /* 滚动条样式 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #d1d5db transparent;
        }
    </style>
</head>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden bg-gray-50">

            <!-- 左侧思考过程面板 -->

                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 bg-primary-600 rounded-full flex items-center justify-center flex-shrink-0">

                        </div>
                        <div class="flex-1 bg-primary-50 rounded-lg p-3">
                            <div class="text-sm text-primary-800">
                                <strong>AI助手:</strong> 这里将显示AI的最终执行结果和总结。

                <div class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>

                        <option value="">请选择提问案例...</option>
                        <option value="检索小傅哥的相关项目，列出一份学习计划">检索小傅哥的相关项目，列出一份学习计划</option>
                        <option value="根据当前北京互联网程序员加班情况，收入，公司文化等，列出一份大学生推荐入职单位。">根据当前北京互联网程序员加班情况，收入，公司文化等，列出一份大学生推荐入职单位。</option>

<script>
    // 生成唯一的会话ID的函数
    function generateSessionId() {
        return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    // 初始化会话ID
    let sessionId = generateSessionId();
    document.getElementById('sessionId').textContent = sessionId;

    let isConnected = false;
    let eventSource = null;
    let currentStepMessages = new Map();

    // 配置marked选项
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                try {
                    return hljs.highlight(code, { language: lang }).value;
                } catch (err) {}
            }
            return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true
    });

    // 阶段类型映射
    const stageTypeMap = {
        'analysis': { name: '分析阶段', icon: '🎯', class: 'stage-analysis' },
        'execution': { name: '执行阶段', icon: '⚡', class: 'stage-execution' },
        'supervision': { name: '监督阶段', icon: '🔍', class: 'stage-supervision' },
        'summary': { name: '总结阶段', icon: '📊', class: 'stage-summary' },
        'error': { name: '错误信息', icon: '❌', class: 'stage-error' },
        'complete': { name: '完成', icon: '✅', class: 'stage-summary' }
    };

    // 子类型映射
    const subTypeMap = {
        'analysis_status': '任务状态',
        'analysis_history': '历史评估',
        'analysis_strategy': '执行策略',
        'analysis_progress': '完成度',
        'analysis_task_status': '任务状态',
        'execution_target': '执行目标',
        'execution_process': '执行过程',
        'execution_result': '执行结果',
        'execution_quality': '质量检查',
        'assessment': '质量评估',
        'issues': '问题识别',
        'suggestions': '改进建议',
        'score': '质量评分',
        'pass': '检查结果',
        'completed_work': '已完成工作',
        'incomplete_reasons': '未完成原因',
        'evaluation': '效果评估',
        'summary_overview': '总结概览'
    };

    // 发送消息
    function sendMessage() {
        const messageInput = document.getElementById('messageInput');
        const message = messageInput.value.trim();

        if (!message) {
            alert('请输入消息内容');
            return;
        }

        if (isConnected) {
            alert('正在处理中，请稍候...');
            return;
        }

        // 显示用户消息
        addMessage(message, 'user');

        // 清空输入框
        messageInput.value = '';

        // 禁用发送按钮
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;

        // 显示加载状态
        document.getElementById('loading').style.display = 'block';

        // 每次对话生成新的会话ID
        sessionId = generateSessionId();
        document.getElementById('sessionId').textContent = sessionId;

        // 准备请求数据
        const requestData = {
            aiAgentId: document.getElementById('aiAgentSelect').value,
            message: message,
            sessionId: sessionId,
            maxStep: parseInt(document.getElementById('maxStepSelect').value)
        };

        // 发送POST请求
        fetch('http://localhost:8091/api/v1/agent/auto_agent', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'text/event-stream'
            },
            body: JSON.stringify(requestData)
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络请求失败: ' + response.status);
                }

                // 处理流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                // 清空当前步骤消息缓存
                currentStepMessages.clear();

                // 清空之前的AI消息（保留欢迎消息）
                const thinkingDiv = document.getElementById('thinkingMessages');
                const resultDiv = document.getElementById('resultMessages');

                // 清空思考面板（保留第一条欢迎消息）
                const thinkingChildren = Array.from(thinkingDiv.children);
                thinkingChildren.slice(1).forEach(child => child.remove());

                // 清空结果面板（保留第一条欢迎消息）
                const resultChildren = Array.from(resultDiv.children);
                resultChildren.slice(1).forEach(child => child.remove());

                isConnected = true;

                function readStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            // Stream ended
                            isConnected = false;
                            sendBtn.disabled = false;
                            document.getElementById('loading').style.display = 'none';
                            // 添加完成标识
                            addStageMessage('complete', null, '任务执行完成', null);
                            return;
                        }

                        // Decode data chunk
                        const chunk = decoder.decode(value, { stream: true });

                        // Process server-sent event stream data
                        const lines = chunk.split('\n');
                        for (let line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.substring(6).trim();
                                if (data && data !== '[DONE]') {
                                    try {
                                        // Try to parse JSON data
                                        const jsonData = JSON.parse(data);
                                        handleSSEMessage(jsonData);
                                    } catch (e) {
                                        // If not JSON, treat as plain text
                                        console.warn('无法解析JSON数据:', data);
                                        addStageMessage('error', null, data, null);
                                    }
                                    // Scroll to bottom after adding content
                                    scrollToBottom();
                                }
                            }
                        }
                        // Continue reading the stream
                        readStream();
                    }).catch(error => {
                        console.error('读取流数据错误:', error);
                        isConnected = false;
                        sendBtn.disabled = false;
                        document.getElementById('loading').style.display = 'none';
                        addStageMessage('error', null, '连接中断，请重试', null);
                    });
                }
                readStream();
            })
            .catch(error => {
                console.error('请求错误:', error);
                isConnected = false;
                sendBtn.disabled = false;
                document.getElementById('loading').style.display = 'none';
                addStageMessage('error', null, '请求失败: ' + error.message, null);
            });
    }

    // 处理SSE消息
    function handleSSEMessage(jsonData) {
        const { type, subType, step, content, completed, timestamp, sessionId } = jsonData;

        if (!content || content.trim() === '') {
            return; // 忽略空内容
        }

        // 根据type和subType添加消息
        addStageMessage(type, subType, content, step);
    }

    // 添加阶段消息
    function addStageMessage(type, subType, content, step) {
        // 根据消息类型决定显示在哪个面板
        let targetContainer;
        if (type === 'summary' || type === 'completed') {
            // 总结和完成消息显示在右侧结果面板
            targetContainer = document.getElementById('resultMessages');
        } else {
            // 其他消息（分析、执行、监督等）显示在左侧思考面板
            targetContainer = document.getElementById('thinkingMessages');
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = 'flex items-start gap-3 message';

        // 获取阶段信息
        const stageInfo = stageTypeMap[type] || { name: type, icon: '📝', class: 'stage-analysis' };
        const subTypeName = subType ? subTypeMap[subType] || subType : '';

        // 构建标识标签
        let indicators = `<span class="stage-indicator ${stageInfo.class}">${stageInfo.icon} ${stageInfo.name}</span>`;
        if (subTypeName) {
            indicators += `<span class="sub-type-indicator">${subTypeName}</span>`;
        }
        if (step) {
            indicators += `<span class="sub-type-indicator">第${step}步</span>`;
        }

        // 渲染Markdown内容
        const renderedContent = marked.parse(content);

        messageDiv.innerHTML = `
            <div class="w-8 h-8 bg-primary-600 rounded-full flex items-center justify-center flex-shrink-0">
                <span class="text-white text-sm font-semibold">AI</span>
            </div>
            <div class="flex-1 bg-primary-50 rounded-lg p-3">
                <div class="text-sm text-primary-800">
                    <strong>AI助手:</strong> ${indicators}
                    <div class="markdown-content">${renderedContent}</div>
                </div>
            </div>
        `;

        targetContainer.appendChild(messageDiv);

        // 高亮代码块
        messageDiv.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
        });

        // 滚动到对应面板的底部
        scrollToBottom(targetContainer);
        return messageDiv;
    }

    // 添加用户消息
    function addMessage(content, type) {
        if (type === 'user') {
            // 用户消息同时显示在两个面板的顶部
            const thinkingDiv = document.getElementById('thinkingMessages');
            const resultDiv = document.getElementById('resultMessages');

            [thinkingDiv, resultDiv].forEach(container => {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'flex items-start gap-3 message';

                messageDiv.innerHTML = `
                    <div class="w-8 h-8 bg-gray-600 rounded-full flex items-center justify-center flex-shrink-0">
                        <span class="text-white text-sm font-semibold">您</span>
                    </div>
                    <div class="flex-1 bg-green-50 rounded-lg p-3">
                        <div class="text-sm text-green-800">
                            <strong>您:</strong> ${content}
                        </div>
                    </div>
                `;
                container.appendChild(messageDiv);
                scrollToBottom(container);
            });
        }
    }

    // 滚动到底部
    function scrollToBottom(container) {
        if (!container) {
            // 如果没有指定容器，滚动两个面板
            const thinkingDiv = document.getElementById('thinkingMessages');
            const resultDiv = document.getElementById('resultMessages');
            thinkingDiv.scrollTop = thinkingDiv.scrollHeight;
            resultDiv.scrollTop = resultDiv.scrollHeight;
        } else {
            container.scrollTop = container.scrollHeight;
        }
    }

    // 新建对话
    function createNewChat() {
        // 清空消息面板（保留欢迎消息）
        const thinkingDiv = document.getElementById('thinkingMessages');
        const resultDiv = document.getElementById('resultMessages');

        const thinkingChildren = Array.from(thinkingDiv.children);
        thinkingChildren.slice(1).forEach(child => child.remove());

        const resultChildren = Array.from(resultDiv.children);
        resultChildren.slice(1).forEach(child => child.remove());

        // 生成新的会话ID
        sessionId = generateSessionId();
        document.getElementById('sessionId').textContent = sessionId;

        // 清空输入框
        document.getElementById('messageInput').value = '';

        // 聚焦输入框
        document.getElementById('messageInput').focus();
    }

    // 清空所有对话
    function clearAllChats() {
        if (confirm('确定要清空所有对话记录吗？')) {
            createNewChat();
            // 这里可以添加清空侧边栏历史记录的逻辑
            document.getElementById('chatList').innerHTML = '';
        }
    }

    // 事件监听器
    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    document.getElementById('exampleSelect').addEventListener('change', function() {
        const selectedExample = this.value;
        if (selectedExample) {
            document.getElementById('messageInput').value = selectedExample;
            this.value = '';
        }
    });

    document.getElementById('newChatBtn').addEventListener('click', createNewChat);
    document.getElementById('clearAllChatsBtn').addEventListener('click', clearAllChats);

    // 页面加载完成后聚焦输入框
    window.addEventListener('load', function() {
        document.getElementById('messageInput').focus();
    });
</script>
</body>
</html>
